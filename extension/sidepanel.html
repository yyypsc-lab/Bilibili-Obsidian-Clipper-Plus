<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 助手</title>
    <link rel="stylesheet" href="./sidepanel.css" />
  </head>
  <body>
    <header class="sp-header">
      <button type="button" class="sp-context-chip" id="spContextChip" title="">加载中...</button>
      <select id="spModelSelect" class="sp-model-select" aria-label="选择模型平台"></select>
      <button id="spRefreshBtn" type="button" class="sp-icon-btn" title="刷新当前视频上下文" aria-label="刷新上下文">
        <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
          <path d="M21 3v5h-5"></path>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
          <path d="M8 16H3v5"></path>
        </svg>
      </button>
      <button id="spSettingsBtn" type="button" class="sp-icon-btn" title="打开设置" aria-label="设置">
        <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
          <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      </button>
    </header>
    <main class="sp-messages" id="spMessages">
      <div class="sp-suggestions" id="spSuggestions"></div>
    </main>
    <footer class="sp-footer">
      <div class="sp-toolbar">
        <button id="spNewChatBtn" type="button" class="sp-toolbar-btn" title="开启新对话">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M12 5v14"></path>
            <path d="M5 12h14"></path>
          </svg>
          <span>开启新对话</span>
        </button>
        <button id="spPresetBtn" type="button" class="sp-toolbar-btn" title="预设提示词">
          <span>预设提示词</span>
        </button>
        <button id="spHistoryBtn" type="button" class="sp-toolbar-btn" title="历史对话">
          <span>历史对话</span>
        </button>
      </div>
      <div id="spPresetPopover" class="sp-preset-popover" hidden>
        <div id="spPresetList" class="sp-preset-list"></div>
        <div class="sp-preset-editor">
          <input id="spPresetInput" class="sp-preset-input" type="text" placeholder="添加预设提示词" />
          <button id="spPresetAddBtn" type="button" class="sp-preset-add-btn">添加</button>
        </div>
      </div>
      <div id="spHistoryPopover" class="sp-history-popover" hidden>
        <div class="sp-history-popover-head">
          <span class="sp-history-popover-title">历史对话</span>
          <button id="spHistoryClearBtn" type="button" class="sp-history-clear-btn">清空全部</button>
        </div>
        <div id="spHistoryList" class="sp-history-list"></div>
      </div>
      <div class="sp-input-row">
        <textarea
          id="spInput"
          rows="2"
          placeholder="回车发送，Shift+Enter 换行"
          autocomplete="off"
        ></textarea>
        <button id="spStopBtn" type="button" class="sp-stop-btn" hidden>停止</button>
      </div>
    </footer>
    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
