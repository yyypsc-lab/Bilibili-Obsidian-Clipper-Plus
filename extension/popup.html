<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilibili Clipper</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="top">
        <strong>B站字幕</strong>
        <div class="top-actions">
          <button id="aiBtn" type="button" class="ghost ghost-ai">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M11.5 4.2l2.05 5.5 5.45 2.05-5.45 2.05-2.05 5.5-2.05-5.5L4 11.75 9.45 9.7l2.05-5.5z"></path>
              <path d="M18.4 4.6l.72 1.92 1.92.72-1.92.72-.72 1.92-.72-1.92-1.92-.72 1.92-.72.72-1.92z"></path>
              <path d="M18.1 13.9l.52 1.38 1.38.52-1.38.52-.52 1.38-.52-1.38-1.38-.52 1.38-.52.52-1.38z"></path>
            </svg>
            <span>AI</span>
          </button>
          <button id="settingsBtn" type="button" class="ghost">设置</button>
        </div>
      </header>

      <p id="status" class="status">准备就绪</p>

      <div class="section-title">属性</div>
      <section class="props">
        <div class="prop-row"><span class="k">title</span><span id="propTitle" class="v"></span></div>
        <div class="prop-row"><span class="k">url</span><span id="propUrl" class="v"></span></div>
        <div class="prop-row"><span class="k">created</span><span id="propCreated" class="v"></span></div>
        <div class="prop-row"><span class="k">tags</span><span id="propTags" class="v"></span></div>
      </section>

      <label class="label" for="subtitleSelect">语言</label>
      <select id="subtitleSelect"></select>

      <label class="label" for="preview">预览</label>
      <textarea id="preview" readonly wrap="off"></textarea>

      <div class="actions">
        <button id="refreshBtn" type="button">刷新</button>
        <button id="copyBtn" type="button">复制</button>
        <button id="downloadBtn" type="button">下载</button>
        <button id="readingViewBtn" type="button">阅读</button>
      </div>
      <button id="sendBtn" type="button" class="send">保存到 Obsidian</button>
      <p id="message" class="message"></p>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
